name: Build MioSU (minSdk 29)

on:
  workflow_dispatch:    # allows manual trigger from Actions tab

jobs:
  build-miosu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MioSU repository
        uses: actions/checkout@v4
        with:
          repository: rzmio/MioSU
          path: MioSU

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission
        run: chmod +x MioSU/gradlew

      - name: Build MioSU Manager with minSdk 29
        run: |
          cd MioSU
          ./gradlew :manager:assembleDebug -PandroidMinSdkVersion=29

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MioSU-Manager-minSdk29
          path: MioSU/manager/build/outputs/apk/debug/*.apk
