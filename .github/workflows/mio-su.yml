name: Build MioSU (minSdk 29)

on:
  workflow_dispatch:

jobs:
  build-miosu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MioSU repository
        uses: actions/checkout@v4
        with:
          repository: rzmio/MioSU
          path: miosu-source

      - name: Debug - list files
        run: |
          echo "Workspace contents:"
          ls -la
          echo "miosu-source contents:"
          ls -la miosu-source
          echo "manager subdirectory:"
          ls -la miosu-source/manager

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Set minSdk to 29 by adding/overriding in gradle.properties
      - name: Set minSdkVersion to 29
        run: |
          echo "androidMinSdkVersion=29" >> miosu-source/manager/gradle.properties
          echo "Updated gradle.properties:"
          cat miosu-source/manager/gradle.properties

      - name: Grant execute permission to gradlew
        run: chmod +x miosu-source/manager/gradlew

      - name: Build MioSU Manager
        run: |
          cd miosu-source/manager
          ./gradlew :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MioSU-Manager-minSdk29
          path: miosu-source/manager/app/build/outputs/apk/debug/*.apk
