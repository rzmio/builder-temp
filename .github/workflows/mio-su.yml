name: Build MioSU Manager (no ksud build)

on:
  workflow_dispatch:

jobs:
  build-manager:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MioSU source
        uses: actions/checkout@v4
        with:
          repository: rzmio/MioSU
          path: miosu

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Get latest KernelSU release tag
        id: get_release
        run: |
          TAG=$(curl -s https://api.github.com/repos/tiann/KernelSU/releases/latest | grep '"tag_name":' | cut -d '"' -f 4)
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Download ksud (arm64)
        run: |
          curl -L -o ksud-arm64 \
            "https://github.com/tiann/KernelSU/releases/download/${{ steps.get_release.outputs.tag }}/ksud-aarch64-linux-android"
          chmod +x ksud-arm64

      - name: Download ksud (x86_64)
        run: |
          curl -L -o ksud-x86_64 \
            "https://github.com/tiann/KernelSU/releases/download/${{ steps.get_release.outputs.tag }}/ksud-x86_64-linux-android"
          chmod +x ksud-x86_64

      - name: Copy ksud to jniLibs
        run: |
          mkdir -p miosu/manager/app/src/main/jniLibs/arm64-v8a
          mkdir -p miosu/manager/app/src/main/jniLibs/x86_64
          cp ksud-arm64 miosu/manager/app/src/main/jniLibs/arm64-v8a/libksud.so
          cp ksud-x86_64 miosu/manager/app/src/main/jniLibs/x86_64/libksud.so

      - name: Grant permission to gradlew
        run: chmod +x miosu/manager/gradlew

      - name: Build manager APK (release)
        working-directory: miosu/manager
        run: ./gradlew clean :app:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MioSU-Manager
          path: miosu/manager/app/build/outputs/apk/release/*.apk
