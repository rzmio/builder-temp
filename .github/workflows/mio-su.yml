name: Build MioSU (minSdk 29)

on:
  workflow_dispatch:

jobs:
  build-miosu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MioSU repository
        uses: actions/checkout@v4
        with:
          repository: rzmio/MioSU
          path: miosu-source

      - name: Debug - list files
        run: |
          echo "Workspace contents:"
          ls -la
          echo "miosu-source contents:"
          ls -la miosu-source
          echo "manager subdirectory:"
          ls -la miosu-source/manager

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Force minSdkVersion to 29
      - name: Set minSdkVersion to 29
        run: |
          echo "androidMinSdkVersion=29" >> miosu-source/manager/gradle.properties
          echo "Updated gradle.properties:"
          cat miosu-source/manager/gradle.properties

      # Fix AIDL package
      - name: Fix AIDL package for MioSU
        run: |
          mkdir -p miosu-source/manager/app/src/main/aidl/me/keion/miosu
          mv miosu-source/manager/app/src/main/aidl/me/weishu/kernelsu/IKsuInterface.aidl \
             miosu-source/manager/app/src/main/aidl/me/keion/miosu/IKsuInterface.aidl
          sed -i 's/package me\.weishu\.kernelsu;/package me.keion.miosu;/' \
             miosu-source/manager/app/src/main/aidl/me/keion/miosu/IKsuInterface.aidl
          rm -rf miosu-source/manager/app/src/main/aidl/me/weishu
          echo "Updated AIDL file:"
          head -n 5 miosu-source/manager/app/src/main/aidl/me/keion/miosu/IKsuInterface.aidl

      # 🔥 Fix native JNI function names (critical for the crash)
      - name: Update JNI function names for new package
        run: |
          find miosu-source/manager/app/src/main/cpp -type f \( -name "*.cpp" -o -name "*.h" -o -name "*.cc" \) -exec sed -i 's/me_weishu_kernelsu/me_keion_miosu/g' {} +
          echo "Updated native files (sample from ksu.cc):"
          grep -A2 "JNIEXPORT" miosu-source/manager/app/src/main/cpp/ksu.cc | head -10 || true

      - name: Grant execute permission to gradlew
        run: chmod +x miosu-source/manager/gradlew

      - name: Build MioSU Manager
        run: |
          cd miosu-source/manager
          ./gradlew :app:assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MioSU-Manager-minSdk29
          path: miosu-source/manager/app/build/outputs/apk/debug/*.apk
