name: Build MioSU (minSdk 29)

on:
  workflow_dispatch:

jobs:
  build-miosu:
    runs-on: ubuntu-latest
    steps:
      # Checkout the MioSU repository into a dedicated directory
      - name: Checkout MioSU repository
        uses: actions/checkout@v4
        with:
          repository: rzmio/MioSU
          path: miosu-source

      # Debug: list contents to verify checkout
      - name: Debug - list files
        run: |
          echo "Contents of workspace:"
          ls -la
          echo "Contents of miosu-source:"
          ls -la miosu-source

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission to gradlew
        run: chmod +x miosu-source/gradlew

      - name: Build MioSU Manager with minSdk 29
        run: |
          cd miosu-source
          ./gradlew :manager:assembleDebug -PandroidMinSdkVersion=29

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MioSU-Manager-minSdk29
          path: miosu-source/manager/build/outputs/apk/debug/*.apk
