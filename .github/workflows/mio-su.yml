name: Build MioSU Manager (only)

on:
  workflow_dispatch:  # manual trigger

jobs:
  build-manager:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout MioSU source
        uses: actions/checkout@v4
        with:
          repository: rzmio/MioSU
          path: miosu

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Install Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Build ksud for ARM64 and x86_64
        working-directory: miosu/userspace/ksud
        run: |
          # Set NDK home from the action output
          echo "NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
          # Build for both targets using cargo-ndk
          cargo ndk -t armeabi-v7a -t arm64-v8a -t x86 -t x86_64 build --release
          # The output will be in target/<triple>/release/ksud

      - name: Copy ksud binaries to jniLibs
        run: |
          mkdir -p miosu/manager/app/src/main/jniLibs/arm64-v8a
          mkdir -p miosu/manager/app/src/main/jniLibs/x86_64
          cp miosu/userspace/ksud/target/aarch64-linux-android/release/ksud miosu/manager/app/src/main/jniLibs/arm64-v8a/libksud.so
          cp miosu/userspace/ksud/target/x86_64-linux-android/release/ksud miosu/manager/app/src/main/jniLibs/x86_64/libksud.so

      - name: Grant permission to gradlew
        run: chmod +x miosu/manager/gradlew

      - name: Build manager APK (release)
        working-directory: miosu/manager
        run: ./gradlew clean :app:assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MioSU-Manager
          path: miosu/manager/app/build/outputs/apk/release/*.apk
