name: Build Kernel for Poco M3 (citrus)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout workflows repo (to get script)
        uses: actions/checkout@v4
        with:
          path: workflows

      - name: Checkout kernel source (citrus branch)
        uses: actions/checkout@v4
        with:
          repository: rzmio/kernel_xiaomi_citrus
          ref: citrus
          path: kernel

      - name: Update Environment
        run: sudo apt update -y

      - name: Install Dependencies
        run: sudo apt install -y git build-essential zip curl

      - name: Download Neutron Toolchain
        run: |
          bash workflows/scripts/mio-ci.sh $GITHUB_WORKSPACE/kernel --tools

      - name: Build kernel
        run: |
          bash workflows/scripts/mio-ci.sh $GITHUB_WORKSPACE/kernel --build

      - name: Upload kernel
        uses: actions/upload-artifact@v4
        with:
          name: citrus-kernel
          path: kernel/*.zip
